<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ステリク - STATIONERY LINK -</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Home Screen -->
        <div id="view-home" class="screen active">
            <div class="home-content">
                <div class="top-status-bar">
                    <span class="coin-display">💰 <span id="coin-count">0</span></span>
                </div>
                <h1 class="game-logo"><span>ステリク</span><br><small>- STATIONERY LINK -</small></h1>
                <div class="user-stats">
                    <p>ハイスコア: <span id="high-score-display">0</span></p>
                    <p>プレイ回数: <span id="play-count-display">0</span></p>
                </div>
                <!-- Character display circle in home just for visuals -->
                <div class="home-center-visual">
                    <img src="assets/mono.png" id="home-equipped-char-img" class="floating-icon main-equipped" alt="icon1">
                </div>
                <button id="btn-play" class="paper-btn primary-size">PLAY</button>
            </div>
        </div>

        <!-- Character Screen -->
        <div id="view-character" class="screen ts-layout">
            <!-- Top Detail Area -->
            <div class="character-detail-area">
                <div class="detail-top">
                    <div class="detail-icon">
                        <img id="detail-char-img" src="" alt="char">
                    </div>
                    <div class="detail-info">
                        <h2 id="detail-char-name">-</h2>
                        <span id="detail-char-series">『-』より</span>
                    </div>
                </div>
                
                <div class="detail-skill-desc">
                    <p id="detail-char-desc">-</p>
                    <div class="warning-icon">!</div>
                </div>

                <div class="detail-stats">
                    <div class="stat-row">
                        <span class="stat-label">レベル <span class="stat-num">1 / 50</span></span>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: 10%;"></div></div>
                        <span class="stat-max">MAX</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">スキル <span class="stat-num">1 / 6</span></span>
                        <div class="progress-bar-bg"><div class="progress-bar-fill skill" style="width: 0%;"></div></div>
                        <span class="stat-ratio">0%</span>
                    </div>
                </div>
            </div>

            <!-- Bottom Container Area -->
            <div class="character-bottom-container">
                <div class="character-list-area">
                    <div class="list-header">
                        <span>ステコレクション</span>
                        <div id="page-dots-container" class="page-dots"></div>
                    </div>
                    <div class="horizontal-scroll-container" id="character-pages-container">
                        <!-- Populated by JS with .char-page elements -->
                    </div>
                </div>
                
                <!-- Set Button moved to bottom area -->
                <div class="character-action-area">
                    <button id="btn-set-mysta" class="paper-btn">マイステにセット</button>
                </div>
            </div>
        </div>

        <!-- Shop Screen -->
        <div id="view-shop" class="screen shop-layout">
            <!-- Top Status Bar (Currency) -->
            <div class="shop-header">
                <div class="currency-group">
                    <span class="currency-item coin">💰 <span id="shop-coin-count">0</span></span>
                    <span class="currency-item heart">❤️ <span>5/5</span></span>
                    <span class="currency-item gem">💎 <span>10</span></span>
                </div>
            </div>

            <!-- Gacha Detail Area (Center) -->
            <div class="shop-main-display" id="selected-gacha-detail">
                <div class="gacha-box-visual">
                    <div class="gacha-box-container">
                        <span id="main-gacha-emoji" class="box-emoji">📦</span>
                        <div class="box-chars" id="main-gacha-chars"></div>
                    </div>
                </div>
                <div class="gacha-info">
                    <h3 id="gacha-title-display">ノーマルガチャ</h3>
                    <div class="gacha-price-tag">
                        💰 <span id="gacha-cost-display">1000</span>
                    </div>
                </div>
                <button id="btn-prepare-gacha" class="paper-btn primary-size draw-btn">引く</button>
            </div>

            <!-- Shop Footer Area -->
            <div class="shop-footer">
                <div class="shop-tabs">
                    <button class="shop-tab active" data-tab="box">文房具ストア</button>
                    <button class="shop-tab" data-tab="item">アイテムストア</button>
                </div>
                <div class="shop-carousel-container">
                    <div class="shop-carousel" id="gacha-carousel">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Draw Animation Overlay (Notebook Canvas) -->
            <div id="gacha-draw-overlay" class="hidden">
                <div class="notebook-canvas-container">
                    <canvas id="gacha-canvas"></canvas>
                    <div class="notebook-hint">▲ ここに一筆書きしてください ▲</div>
                </div>
                <button id="btn-cancel-draw" class="paper-btn small">もどる</button>
            </div>

            <!-- Confirmation Modal -->
            <div id="gacha-confirm-modal" class="hidden overlay-blur">
                <div class="confirm-content sticky-note">
                    <h3>確認</h3>
                    <p><span id="confirm-gacha-name">ノーマルガチャ</span>を</p>
                    <p>💰 <span id="confirm-gacha-cost">1000</span> で引きますか？</p>
                    <div class="confirm-btns">
                        <button id="btn-confirm-ok" class="paper-btn">OK</button>
                        <button id="btn-confirm-cancel" class="paper-btn secondary">キャンセル</button>
                    </div>
                </div>
            </div>

            <!-- Result Overlay for Gacha -->
            <div id="gacha-result-overlay" class="hidden">
                <h2 id="gacha-result-title">New!</h2>
                <img id="gacha-result-img" src="" alt="result">
                <p id="gacha-result-name">キャラ名</p>
                <button id="btn-close-gacha" class="paper-btn">OK</button>
            </div>
        </div>

        <!-- Play Screen (Game) -->
        <div id="view-play" class="screen">
            <!-- 1. Top Header Area (Curved bottom) -->
            <header class="game-header-v3">
                <div class="header-left">
                    <div class="paper-label-circle">
                        <span id="time">60</span>
                    </div>
                </div>
                <div class="header-center">
                    <div class="paper-label-score">
                        <small>SCORE</small>
                        <span id="score">0</span>
                    </div>
                    <div class="paper-label-coin">
                        🪙 <span id="game-coin-count">0</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="pause-btn-paper" onclick="window.togglePause()">
                        <span>II</span>
                    </button>
                </div>
            </header>

            <!-- 2. Central Play Area -->
            <div id="game-canvas-area">
                <canvas id="game-canvas"></canvas>
                <div id="effects-layer"></div>
                
                <div id="pause-overlay" class="pause-overlay hidden">
                    <div class="pause-content">
                        <h2>PAUSED</h2>
                        <p>休憩中...</p>
                        <div class="pause-btns">
                            <button class="paper-btn small" onclick="window.togglePause()">再開する</button>
                            <button id="btn-quit-game" class="paper-btn small secondary">やめる</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. Bottom Footer Area (Curved top) -->
            <footer class="game-footer-v3">
                <div id="skill-btn-wrapper-v2">
                    <div class="skill-gauge-container">
                        <div id="skill-gauge-fill" class="skill-gauge-fill" style="height: 0%;"></div>
                    </div>
                    <button id="skill-btn" class="skill-btn-circle" disabled>
                        <img id="skill-char-img" src="" alt="skill" width="50" height="50">
                    </button>
                </div>
            </footer>
        </div>

        <!-- Side Navigation (Sticky Tabs) -->
        <nav id="side-nav">
            <div class="nav-item active sticky-tab" data-target="view-home">
                <div class="nav-icon">🏠</div>
                <span>ホーム</span>
            </div>
            <div class="nav-item sticky-tab" data-target="view-character">
                <div class="nav-icon">📓</div>
                <span>マイステ</span>
            </div>
            <div class="nav-item sticky-tab" data-target="view-shop">
                <div class="nav-icon">🛍️</div>
                <span>ショップ</span>
            </div>
        </nav>
    </div>

    <!-- 戻るボタン (Overall portfolio exit) -->
    <a href="../index.html" class="portfolio-back-button">← Back to Portfolio</a>

    <script src="data.js"></script>
    <script src="game.js"></script>
    <script src="ui.js"></script>
    <script src="gacha.js"></script>
</body>
</html>
